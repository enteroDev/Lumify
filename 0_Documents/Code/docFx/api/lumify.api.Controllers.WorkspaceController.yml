  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: Soft-deletes a workspace. Only the owner may delete it.
  remarks: >-
    The audience is captured before deletion so a <code>WorkspaceDeleted</code> event
        can still be broadcast to all former members.
  example: []
  syntax:
    content: >-
      [HttpDelete]

      [ActionName("deleteWorkspace")]

      public Task<ActionResult> DeleteWorkspace(string workspaceID, CancellationToken ct)
    parameters:
    - id: workspaceID
      type: System.String
      description: The workspace to delete.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult}
      description: >-
        200 with <code>success = true</code> and the workspace ID; 400 if the ID is
            missing; 403 if the caller is not the owner; 404 if the workspace does not exist.
