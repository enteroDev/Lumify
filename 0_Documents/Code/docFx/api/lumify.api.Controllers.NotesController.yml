  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: >-
    Updates a note's name and/or its folder (move). Only provided fields are changed, and

    the database is only written if something changed.
  remarks: >-
    Move rules: a personal note may only move into another personal folder of the same

    owner; a workspace note may only move within the same workspace; an empty folder ID

    moves the note to the root. On a successful change in a workspace, a <code>NoteUpdated</code>

    event is broadcast to the workspace group.
  example: []
  syntax:
    content: >-
      [HttpPatch]

      [ActionName("saveNote")]

      public Task<ActionResult<NoteResponse>> SaveNote(SaveNoteRequest request, CancellationToken ct)
    parameters:
    - id: request
      type: lumify.api.Models.DTO.Requests.SaveNoteRequest
      description: The note ID plus the fields to change.
      attributes:
      - type: Microsoft.AspNetCore.Mvc.FromBodyAttribute
        ctor: Microsoft.AspNetCore.Mvc.FromBodyAttribute.#ctor
        arguments: []
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult{lumify.api.Models.DTO.Responses.NoteResponse}}
      description: >-
        200 with the updated note; 400 on invalid input or move target; 403 if the
            user may not modify it; 404 if the note does not exist.
    content.vb: >-
      <HttpPatch>

      <ActionName("saveNote")>

      Public Function SaveNote(request As SaveNoteRequest, ct As CancellationToken) As Task(Of ActionResult(Of NoteResponse))
