      [HttpDelete]

      [ActionName("deleteNote")]

      public Task<ActionResult> DeleteNote(string noteID, CancellationToken ct)
    parameters:
    - id: noteID
      type: System.String
      description: The note to delete.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult}
      description: >-
        200 with <code>success = true</code> and the note ID; 400 if the ID is missing;
            403 if the user may not delete it; 404 if the note does not exist.
    content.vb: >-
