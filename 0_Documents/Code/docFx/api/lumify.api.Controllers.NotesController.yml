      description: Note data (name required; optional workspace and folder).
      attributes:
      - type: Microsoft.AspNetCore.Mvc.FromBodyAttribute
        ctor: Microsoft.AspNetCore.Mvc.FromBodyAttribute.#ctor
        arguments: []
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult{lumify.api.Models.DTO.Responses.NoteResponse}}
      description: >-
        200 with the created note; 400 on missing name or invalid workspace/folder;
