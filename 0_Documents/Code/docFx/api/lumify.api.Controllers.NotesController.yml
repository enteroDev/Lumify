  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: >-
    Soft-deletes a note together with all of its modules (text blocks, link items) and

    attachments.
  remarks: >-
    Everything is kept and marked with <code>DeletedAt</code>. On a workspace note, a
        <code>NoteDeleted</code> event is broadcast to the workspace group.
  example: []
  syntax:
