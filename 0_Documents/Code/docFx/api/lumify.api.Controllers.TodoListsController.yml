  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: >-
    Updates a todo entry's name, description and/or status (1 or 2). Only provided fields

    are changed, and the database is only written if something changed.
  remarks: >-
    Toggling the status keeps the parent list in sync: checking the last open entry marks

    the list done, unchecking an entry reopens it. The response's <code>WasLastUnchecked</code>

    flag signals the former. Relevant <code>TodoEntryUpdated</code>/<code>TodoListUpdated</code> events

    are broadcast to the workspace group.
  example: []
  syntax:
    content: >-
      [HttpPatch]

      [ActionName("saveTodoEntry")]

      public Task<ActionResult<TodoEntryResponse>> SaveTodoEntry(SaveTodoEntryRequest request, CancellationToken ct)
    parameters:
    - id: request
      type: SaveTodoEntryRequest
      description: The entry ID plus the fields to change.
      attributes:
      - type: Microsoft.AspNetCore.Mvc.FromBodyAttribute
        ctor: Microsoft.AspNetCore.Mvc.FromBodyAttribute.#ctor
        arguments: []
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult{lumify.api.Models.DTO.Responses.TodoEntryResponse}}
      description: >-
        200 with the updated entry; 400 on invalid input (e.g. status not 1/2);
            403 if the user may not modify it; 404 if the entry or its parent list does not exist.
    content.vb: >-
      <HttpPatch>

      <ActionName("saveTodoEntry")>

