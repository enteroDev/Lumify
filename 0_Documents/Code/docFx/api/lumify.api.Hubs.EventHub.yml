  assemblies:
  - lumify.api
  namespace: lumify.api.Hubs
  summary: >-
    SignalR hub for real-time calendar event updates within a workspace. Clients join the

    group of a workspace to receive its live events (<code>EventCreated</code>, <code>EventUpdated</code>,

    <code>EventDeleted</code>) broadcast by the <xref href="lumify.api.Controllers.EventsController" data-throw-if-not-resolved="false"></xref>. Requires

    an authenticated connection.
  example: []
  syntax:
    content: >-
      [Authorize]

      public class EventHub : Hub
    content.vb: >-
      <Authorize>

      Public Class EventHub Inherits Hub
