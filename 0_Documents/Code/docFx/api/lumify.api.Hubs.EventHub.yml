  namespace: lumify.api.Hubs
  summary: >-
    Adds the caller's connection to a workspace group so it receives that workspace's

    event updates. No-op if <code class="paramref">workspaceID</code> is empty.
  example: []
  syntax:
    content: public Task JoinWorkspace(string workspaceID)
    parameters:
    - id: workspaceID
      type: System.String
      description: The workspace to join.
    return:
      type: System.Threading.Tasks.Task
