  summary: Sends the password-reset mail containing the one-time reset link to the user.
  example: []
  syntax:
    content: Task SendPasswordResetEmailAsync(string toEmail, string? displayName, string resetLink, CancellationToken ct)
    parameters:
    - id: toEmail
      type: System.String
      description: The recipient's e-mail address.
    - id: displayName
      type: System.String
      description: The recipient's display name for the greeting, if known.
    - id: resetLink
      type: System.String
      description: The one-time reset link to embed.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the send operation.
    return:
      type: System.Threading.Tasks.Task
