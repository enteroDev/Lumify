  namespace: lumify.api.Services
  summary: >-
    Removes an accepted friendship by soft-deleting it. Only accepted friendships can be

    removed.
  example: []
  syntax:
    content: public Task RemoveFriend(string currentUserID, string friendID)
    parameters:
    - id: currentUserID
      type: System.String
      description: The user performing the removal.
    - id: friendID
      type: System.String
      description: The friend to remove.
    return:
