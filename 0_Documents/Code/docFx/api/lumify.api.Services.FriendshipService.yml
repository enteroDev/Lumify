  assemblies:
  - lumify.api
  namespace: lumify.api.Services
  summary: >-
    Creates a pending friend request from one user to another, or resurrects a previously

    removed relationship as a fresh request.
  example: []
  syntax:
    content: public Task SendFriendRequest(string requesterID, string addresseeID)
    parameters:
    - id: requesterID
      type: System.String
      description: The user sending the request.
    - id: addresseeID
      type: System.String
      description: The user receiving the request.
    return:
      type: System.Threading.Tasks.Task
    content.vb: Public Function SendFriendRequest(requesterID As String, addresseeID As String) As Task
  overload: lumify.api.Services.FriendshipService.SendFriendRequest*
  exceptions:
  - type: System.Exception
    commentId: T:System.Exception
    description: >-
      Thrown if an ID is missing, the user adds themselves, or an
          active friendship already exists.
