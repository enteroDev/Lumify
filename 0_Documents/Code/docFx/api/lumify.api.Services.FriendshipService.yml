  assemblies:
  - lumify.api
  namespace: lumify.api.Services
  summary: >-
    Encapsulates the friendship domain logic used by the

    <xref href="lumify.api.Controllers.FriendshipController" data-throw-if-not-resolved="false"></xref>: sending, accepting, rejecting and

    removing friendships, including the validation and state transitions involved.
  remarks: >-
    Each friendship is stored once per user pair using ordered <code>UserLowID</code>/<code>UserHighID</code>

    keys (a plain unique index, since MariaDB has no filtered indexes), so a soft-deleted row

    is resurrected rather than duplicated. Invalid operations throw, and the controller maps

    those to error responses.
  example: []
  syntax:
    content: public class FriendshipService
    content.vb: Public Class FriendshipService
  inheritance:
  - System.Object
