  assemblies:
  - lumify.api
  namespace: lumify.api.Services
  summary: >-
    Accepts a pending friend request. Only the addressee may accept, and only pending

    requests can be accepted.
  example: []
  syntax:
    content: public Task<string> AcceptFriendRequest(string friendshipID, string currentUserID)
    parameters:
    - id: friendshipID
      type: System.String
      description: The pending friendship to accept.
    - id: currentUserID
      type: System.String
      description: The user performing the action (must be the addressee).
    return:
      type: System.Threading.Tasks.Task{System.String}
      description: The requester's ID, so the caller can notify the counterpart of the change.
    content.vb: Public Function AcceptFriendRequest(friendshipID As String, currentUserID As String) As Task(Of String)
  overload: lumify.api.Services.FriendshipService.AcceptFriendRequest*
  exceptions:
  - type: System.Exception
    commentId: T:System.Exception
    description: >-
      Thrown if an ID is missing, the friendship is not found,
          the caller is not the addressee, or the request is not pending.
  nameWithType.vb: FriendshipService.AcceptFriendRequest(String, String)
  fullName.vb: lumify.api.Services.FriendshipService.AcceptFriendRequest(String, String)
  name.vb: AcceptFriendRequest(String, String)
