  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: >-
    Soft-deletes a folder together with all of its descendant sub-folders and their

    notes (recursive, breadth-first).
  remarks: >-
    Nothing is physically removed — all affected rows get a <code>DeletedAt</code> timestamp.

    On a workspace folder, a <code>FolderDeleted</code> event is broadcast to the workspace group.
  example: []
  syntax:
    content: >-
      [HttpDelete]

      [ActionName("deleteFolder")]

      public Task<ActionResult> DeleteFolder(string folderID, CancellationToken ct)
    parameters:
    - id: folderID
      type: System.String
      description: The root folder to delete.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult}
      description: >-
        200 with <code>success = true</code> and the folder ID; 400 if the ID is missing;
            403 if the user may not delete it; 404 if the folder does not exist.
    content.vb: >-
