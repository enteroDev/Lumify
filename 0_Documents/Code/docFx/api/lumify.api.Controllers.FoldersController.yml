  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: >-
    Updates a folder's name, description and/or parent (move). Only the provided fields

    are changed; the database is only written if something actually changed.
  remarks: >-
    Move rules: a folder cannot be moved into itself; a personal folder may only move

    into another personal folder of the same owner; a workspace folder may only move

    within the same workspace. On a successful change in a workspace, a

    <code>FolderUpdated</code> event is broadcast to the workspace group.
  example: []
  syntax:
    content: >-
      [HttpPatch]

      [ActionName("saveFolder")]

      public Task<ActionResult<FolderResponse>> SaveFolder(SaveFolderRequest request, CancellationToken ct)
    parameters:
    - id: request
      type: lumify.api.Models.DTO.Requests.SaveFolderRequest
      description: The folder ID plus the fields to change.
      attributes:
      - type: Microsoft.AspNetCore.Mvc.FromBodyAttribute
        ctor: Microsoft.AspNetCore.Mvc.FromBodyAttribute.#ctor
        arguments: []
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult{lumify.api.Models.DTO.Responses.FolderResponse}}
      description: >-
        200 with the updated folder; 400 on invalid input or move target; 403 if
            the user may not modify it; 404 if the folder does not exist.
    content.vb: >-
      <HttpPatch>

      <ActionName("saveFolder")>

      Public Function SaveFolder(request As SaveFolderRequest, ct As CancellationToken) As Task(Of ActionResult(Of FolderResponse))
