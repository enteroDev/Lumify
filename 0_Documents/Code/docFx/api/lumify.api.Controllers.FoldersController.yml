  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: Creates a new folder, optionally inside a workspace and/or a parent folder.
  remarks: >-
    If a workspace is given, the user must be a member of it; if a parent folder is

    given, it must live in the same space. On success in a workspace, a

    <code>FolderCreated</code> event is broadcast to the workspace group.
  example: []
  syntax:
    content: >-
      [HttpPost]

      [ActionName("addFolder")]

      public Task<ActionResult<FolderResponse>> AddFolder(AddFolderRequest request, CancellationToken ct)
    parameters:
    - id: request
      type: lumify.api.Models.DTO.Requests.AddFolderRequest
      description: Folder data (name required; optional description, workspace, parent).
      attributes:
      - type: Microsoft.AspNetCore.Mvc.FromBodyAttribute
        ctor: Microsoft.AspNetCore.Mvc.FromBodyAttribute.#ctor
        arguments: []
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult{lumify.api.Models.DTO.Responses.FolderResponse}}
      description: >-
        200 with the created folder; 400 on missing name or invalid workspace/parent;
            403 if the user is not a member of the target workspace or owner of the parent.
    content.vb: >-
      <HttpPost>

