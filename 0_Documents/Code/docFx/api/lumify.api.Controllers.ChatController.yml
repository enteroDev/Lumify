    startLine: 51
  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: Returns the full message history of a chat room, oldest first.
  remarks: >-
    Soft-deleted messages and messages from soft-deleted users are excluded. The

    sender name is resolved to the user's display name (falling back to username,

    full name, or ID).
  example: []
  syntax:
    content: >-
      [HttpGet]

      [ActionName("getMessagesOfRoom")]

      public Task<ActionResult<List<ChatMessageResponse>>> GetMessagesOfRoom(string roomID, CancellationToken ct)
    parameters:
    - id: roomID
      type: System.String
      description: The room whose messages are requested.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult{System.Collections.Generic.List{lumify.api.Models.DTO.Responses.ChatMessageResponse}}}
      description: 200 with the list of messages; 400 if <code class="paramref">roomID</code> is missing.
    content.vb: >-
      <HttpGet>

      <ActionName("getMessagesOfRoom")>

      Public Function GetMessagesOfRoom(roomID As String, ct As CancellationToken) As Task(Of ActionResult(Of List(Of ChatMessageResponse)))
