      description: The event to delete.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult}
      description: >-
        200 with <code>success = true</code> and the event ID; 400 if the ID is missing;
            403 if the user may not delete it; 404 if the event does not exist.
