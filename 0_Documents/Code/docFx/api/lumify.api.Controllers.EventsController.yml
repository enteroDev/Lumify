  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: Creates a new calendar event, optionally inside a workspace.
  remarks: >-
    Start and end times must be valid dates and end must not be before start. If a

    workspace is given, the user must be a member of it. On success in a workspace, an

    <code>EventCreated</code> event is broadcast to the workspace group.
  example: []
  syntax:
    content: >-
      [HttpPost]

      [ActionName("addEvent")]

      public Task<ActionResult<EventResponse>> AddEvent(AddEventRequest request, CancellationToken ct)
    parameters:
    - id: request
      type: lumify.api.Models.DTO.Requests.AddEventRequest
      description: Event data (name, start/end time required; optional description, all-day, workspace).
      attributes:
      - type: Microsoft.AspNetCore.Mvc.FromBodyAttribute
        ctor: Microsoft.AspNetCore.Mvc.FromBodyAttribute.#ctor
        arguments: []
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.ActionResult{lumify.api.Models.DTO.Responses.EventResponse}}
      description: >-
        200 with the created event; 400 on missing/invalid fields; 403 if the user
            is not a member of the target workspace.
    content.vb: >-
      <HttpPost>

