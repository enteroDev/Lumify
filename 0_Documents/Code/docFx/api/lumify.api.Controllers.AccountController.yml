  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: Authenticates a user by username or e-mail and password.
  remarks: >-
    If 2FA is enabled, no session is issued yet — a short-lived MFA challenge token

    is returned instead and the client must call <xref href="lumify.api.Controllers.AccountController.VerifyTotpLogin(lumify.api.Models.DTO.Requests.VerifyTotpLoginRequest)" data-throw-if-not-resolved="false"></xref> with

    the 6-digit code. Soft-deleted and unconfirmed accounts cannot log in.
  example: []
  syntax:
    content: >-
      [HttpPost]

      [ActionName("loginUser")]

      public Task<IActionResult> LoginUser(LoginRequest dto)
    parameters:
    - id: dto
      type: lumify.api.Models.DTO.Requests.LoginRequest
      description: 'Credentials: <code>Identifier</code> (username or e-mail) and password.'
      attributes:
      - type: Microsoft.AspNetCore.Mvc.FromBodyAttribute
        ctor: Microsoft.AspNetCore.Mvc.FromBodyAttribute.#ctor
        arguments: []
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.IActionResult}
      description: >-
        200 with user data (session in cookie) on success without 2FA; 200 with

        <code>mfaRequired = true</code> and an MFA token when 2FA is enabled; 401 for invalid

        credentials; 403 when the e-mail address is not yet confirmed.
    content.vb: >-
      <HttpPost>

      <ActionName("loginUser")>

      Public Function LoginUser(dto As LoginRequest) As Task(Of IActionResult)
  overload: lumify.api.Controllers.AccountController.LoginUser*
