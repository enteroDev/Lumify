  assemblies:
  - lumify.api
  namespace: lumify.api.Controllers
  summary: Soft-deletes the current user's own account by setting <code>DeletedAt</code>.
  remarks: >-
    Content is not cascaded: personal items become inaccessible (the user can no longer

    log in), while workspace items stay with the workspace and remain visible and

    editable for the other members.
  example: []
  syntax:
    content: >-
      [HttpDelete]

      [ActionName("deleteAccount")]

      [Authorize]

      public Task<IActionResult> DeleteAccount(CancellationToken ct)
    parameters:
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the request.
    return:
      type: System.Threading.Tasks.Task{Microsoft.AspNetCore.Mvc.IActionResult}
      description: >-
        200 with <code>success = true</code>; 401 if the user ID claim is missing; 404 if
            the user does not exist.
    content.vb: >-
