  summary: >-
    A single-use token backing an e-mail verification link. Only the hash of the token is stored

    (same approach as <xref href="lumify.api.Models.EF.PasswordResetToken" data-throw-if-not-resolved="false"></xref>), so a leaked row cannot be turned back

    into a working link.
