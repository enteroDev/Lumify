  assemblies:
  - lumify.api
  namespace: lumify.api.Hubs
  summary: >-
    SignalR hub for real-time folder and note updates within a workspace. Clients join the

    group of a workspace to receive its live events (e.g. <code>NoteCreated</code>,

    <code>NoteUpdated</code>, <code>NoteDeleted</code>, <code>FolderCreated</code>, …) broadcast by the

    <xref href="lumify.api.Controllers.NotesController" data-throw-if-not-resolved="false"></xref> and <xref href="lumify.api.Controllers.FoldersController" data-throw-if-not-resolved="false"></xref>.

    Requires an authenticated connection.
  example: []
  syntax:
    content: >-
      [Authorize]

      public class NoteHub : Hub
    content.vb: >-
      <Authorize>

      Public Class NoteHub Inherits Hub
